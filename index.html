<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2BC4A7">
  <title>Худеем на здоровье — Прототип</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="auth-overlay" class="auth-overlay" hidden>
  <div class="auth-card">
    <div class="auth-brand">Худеем на здоровье</div>
    <p class="auth-sub">Войдите или создайте аккаунт — данные синхронизируются с сервером.</p>
    <div id="auth-error" class="auth-error" role="alert" hidden></div>
    <label class="auth-label">Email</label>
    <input type="email" id="auth-email" class="auth-input" placeholder="you@example.com" autocomplete="username">
    <label class="auth-label">Пароль</label>
    <input type="password" id="auth-password" class="auth-input" placeholder="Не менее 6 символов" autocomplete="current-password">
    <label class="auth-label" id="auth-name-wrap" hidden>Имя</label>
    <input type="text" id="auth-name" class="auth-input" hidden placeholder="Как к вам обращаться?">
    <div class="auth-actions">
      <button type="button" class="auth-btn auth-btn-primary" id="auth-submit">Войти</button>
      <button type="button" class="auth-btn auth-btn-ghost" id="auth-toggle">Регистрация</button>
    </div>
    <button type="button" class="auth-demo" id="auth-demo">Быстрый демо-вход</button>
  </div>
</div>

<div class="device-switcher">
  <button type="button" class="device-btn active" data-device="phone" onclick="setDevice('phone')">📱 Телефон</button>
  <button type="button" class="device-btn" data-device="tablet" onclick="setDevice('tablet')">📋 Планшет</button>
  <button type="button" class="device-btn" data-device="pc" onclick="setDevice('pc')">💻 ПК</button>
</div>

<div class="phone-frame" id="phone-frame">
  <div class="app" id="app">
    <div class="header" id="header">
      <div class="header-spacer"></div>
      <span class="header-title" id="header-title">Сообщество</span>
      <div id="header-right" class="header-spacer"></div>
    </div>
    <div class="content" id="content"></div>
    <div class="nav" id="nav"></div>
  </div>
</div>

<script src="js/app.js" defer></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
  }
</script>
</body>
</html>
